<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #000;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .root {
    width: 1024px;
    height: 500px;
    background: #000;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
    overflow: hidden;
  }

  /* Background glow */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
  }
  .glow-1 {
    width: 500px; height: 500px;
    background: rgba(229,9,20,0.18);
    top: -100px; left: -100px;
  }
  .glow-2 {
    width: 400px; height: 400px;
    background: rgba(229,9,20,0.10);
    bottom: -100px; right: 200px;
  }

  /* Grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Left side */
  .left {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-box {
    width: 56px;
    height: 56px;
    background: #E50914;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
    box-shadow: 0 0 30px rgba(229,9,20,0.5);
  }

  .app-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: 46px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -2px;
    max-width: 480px;
  }

  .tagline span {
    color: #E50914;
  }

  .subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    max-width: 400px;
    line-height: 1.6;
  }

  .pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    max-width: 480px;
  }

  .pill {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 500;
  }

  /* Right side — mock phone */
  .right {
    position: relative;
    z-index: 2;
    width: 200px;
    height: 380px;
    flex-shrink: 0;
  }

  .phone {
    width: 200px;
    height: 380px;
    background: #111;
    border-radius: 32px;
    border: 2px solid rgba(255,255,255,0.12);
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 40px rgba(229,9,20,0.15);
  }

  .phone-notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    padding: 28px 10px 10px;
    gap: 6px;
  }

  .phone-header {
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .channel-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 6px 8px;
  }

  .channel-thumb {
    width: 36px;
    height: 26px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .channel-info { flex: 1; }

  .channel-name {
    font-size: 8px;
    color: #fff;
    font-weight: 600;
  }

  .channel-cat {
    font-size: 7px;
    color: rgba(255,255,255,0.4);
  }

  .live-badge {
    background: #E50914;
    color: white;
    font-size: 6px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
  }

  .now-playing {
    background: linear-gradient(135deg, #1a0000, #1C1C1C);
    border: 1px solid rgba(229,9,20,0.3);
    border-radius: 10px;
    padding: 8px;
    margin-top: 4px;
  }

  .np-label { font-size: 7px; color: #E50914; font-weight: 700; margin-bottom: 3px; }
  .np-title { font-size: 9px; color: #fff; font-weight: 600; }
  .np-bar {
    margin-top: 6px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .np-progress { width: 60%; height: 100%; background: #E50914; border-radius: 2px; }

  .bottom-nav {
    margin-top: auto;
    display: flex;
    justify-content: space-around;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 6px 0;
  }

  .nav-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .nav-dot.active { background: #E50914; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="root">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="grid"></div>

  <!-- Left -->
  <div class="left">
    <div class="logo-row">
      <div class="logo-box">G</div>
      <div class="app-name">Galya Player</div>
    </div>

    <div class="tagline">
      Your IPTV,<br><span>your way.</span>
    </div>

    <div class="subtitle">
      Live TV · Movies · Series · Downloads
    </div>

    <div class="pills">
      <div class="pill">Xtream API</div>
      <div class="pill">M3U Playlists</div>
      <div class="pill">Google Cast</div>
      <div class="pill">Voice Search</div>
      <div class="pill">Kids Mode</div>
      <div class="pill">Multi-profile</div>
    </div>
  </div>

  <!-- Right — Phone mockup -->
  <div class="right">
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="phone-header">Live TV</div>

        <div class="channel-row">
          <div class="channel-thumb" style="background:linear-gradient(135deg,#1a1a2e,#16213e);">
            <svg width="36" height="26" viewBox="0 0 36 26"><rect width="36" height="26" rx="4" fill="#0f3460"/><text x="18" y="17" text-anchor="middle" fill="white" font-size="10" font-weight="bold">BBC</text></svg>
          </div>
          <div class="channel-info">
            <div class="channel-name">BBC One</div>
            <div class="channel-cat">News &amp; Entertainment</div>
          </div>
          <div class="live-badge">LIVE</div>
        </div>

        <div class="channel-row">
          <div class="channel-thumb" style="background:linear-gradient(135deg,#1b1b2f,#2d2d44);">
            <svg width="36" height="26" viewBox="0 0 36 26"><rect width="36" height="26" rx="4" fill="#c0392b"/><text x="18" y="17" text-anchor="middle" fill="white" font-size="8" font-weight="bold">CNN</text></svg>
          </div>
          <div class="channel-info">
            <div class="channel-name">CNN International</div>
            <div class="channel-cat">News</div>
          </div>
          <div class="live-badge">LIVE</div>
        </div>

        <div class="channel-row">
          <div class="channel-thumb" style="background:linear-gradient(135deg,#0d0d0d,#1a1a1a);">
            <svg width="36" height="26" viewBox="0 0 36 26"><rect width="36" height="26" rx="4" fill="#1a1a1a"/><text x="18" y="17" text-anchor="middle" fill="#E50914" font-size="7" font-weight="bold">ESPN</text></svg>
          </div>
          <div class="channel-info">
            <div class="channel-name">ESPN HD</div>
            <div class="channel-cat">Sports</div>
          </div>
          <div class="live-badge">LIVE</div>
        </div>

        <div class="now-playing">
          <div class="np-label">▶ NOW PLAYING</div>
          <div class="np-title">BBC One · Evening News</div>
          <div class="np-bar"><div class="np-progress"></div></div>
        </div>

        <div class="bottom-nav">
          <div class="nav-dot active"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
          <div class="nav-dot"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
